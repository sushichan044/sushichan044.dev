    "@astrojs/check": 0.9.9
    "@astrojs/cloudflare": 14.0.1
    "@astrojs/ts-plugin": 1.10.9
    "@iconify-json/lucide": 1.2.114
    "@tailwindcss/vite": 4.3.1
    "@types/node": 26.0.1
    "@typescript-eslint/parser": 8.62.0
    "@typescript/native-preview": 7.0.0-dev.20260624.1
    "@virtual-live-lab/tsconfig": 2.1.23
    astro-og: 0.3.2
    astro-simple-feature-flags: 2.2.0
    eslint: 10.6.0
    eslint-plugin-astro: 2.1.1
    eslint-plugin-better-tailwindcss: 4.6.0
