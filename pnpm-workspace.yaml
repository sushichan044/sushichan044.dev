  - "@takumi-rs/core-linux-arm64-gnu@2.0.0-rc.1"
  - "@takumi-rs/core-linux-arm64-musl@2.0.0-rc.1"
  - "@takumi-rs/core-linux-x64-gnu@2.0.0-rc.1"
  - "@takumi-rs/core-linux-x64-musl@2.0.0-rc.1"
  - "@takumi-rs/core-win32-arm64-msvc@2.0.0-rc.1"
  - "@takumi-rs/core-win32-x64-msvc@2.0.0-rc.1"
  - "@takumi-rs/core@2.0.0-rc.1"
  - "@takumi-rs/helpers@2.0.0-rc.1"
  - "@takumi-rs/wasm@2.0.0-rc.1"
  - takumi-js@2.0.0-rc.1

saveExact: true

overrides:
  vite: "catalog:dev"
  vitest: "catalog:dev"

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"

patchedDependencies:
  astro: patches/astro.patch
  eslint-plugin-astro@2.1.1: patches/eslint-plugin-astro@2.1.1.patch
